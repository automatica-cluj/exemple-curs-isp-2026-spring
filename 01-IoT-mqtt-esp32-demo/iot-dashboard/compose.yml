services:
  postgres:
    image: postgres:16-alpine
    container_name: iot-postgres
    environment:
      POSTGRES_DB: iotdb
      POSTGRES_USER: iotdb
      POSTGRES_PASSWORD: iotdb
    ports:
      - "5432:5432"
    volumes:
      - iot-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iotdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: iot-dashboard
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  iot-data:
