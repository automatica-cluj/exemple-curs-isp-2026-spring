server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: iot-dashboard

  datasource:
    url: jdbc:h2:mem:iotdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

# MQTT Broker configuration (matching ESP32 sketch settings)
mqtt:
  broker: control.aut.utcluj.ro
  port: 11188

# Admin password for firmware upload and OTA deploy
admin:
  password: changeme123

# OTA firmware configuration
firmware:
  storage-dir: ./firmware
  download-url: http://20.223.137.228:8080/api/firmware/latest
